<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 목소리 건강 일기장</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --save-color: #4da6ff;
            --save-hover: #358be6;
            --border-color: #eaddd3;
            --pill-success: #2eb82e;
            --exit-color: #a09184;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
            color: #d17377;
        }
        .pill-container {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .pill-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #8c7664;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .pill-buttons {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .pill-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
            color: #777;
        }
        .pill-btn.taken {
            background-color: #e6f7e6;
            border-color: var(--pill-success);
            color: var(--pill-success);
        }
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        #record-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 142, 148, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 10px rgba(179, 162, 151, 0.4);
        }
        #save-btn {
            background-color: var(--save-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(77, 166, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            display: none;
        }
        #save-btn:hover {
            background-color: var(--save-hover);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        #text-output {
            width: 100%;
            min-height: 120px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 22px;
            line-height: 1.6;
            background-color: #fffdfb;
            color: #2b231c;
            outline: none;
        }
        #text-output:focus {
            border-style: solid;
            border-color: var(--save-color);
        }
        
        .photo-upload-box {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-file-input {
            display: none;
        }
        .photo-upload-label {
            background-color: #f1e4d8;
            color: #5c4d40;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            transition: 0.2s;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .photo-upload-label:hover {
            background-color: #e5d4c3;
        }
        .photo-preview-container {
            margin-top: 10px;
            position: relative;
            text-align: center;
        }
        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .diary-photo {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            margin-top: 12px;
            display: block;
            border: 1px solid var(--border-color);
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .filter-btn {
            padding: 8px 16px;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: white;
            color: #8c7664;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background-color: #8c7664;
            color: white;
            border-color: #8c7664;
        }
        .diary-list {
            margin-top: 10px;
        }
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .diary-date {
            font-size: 16px;
            color: #a09184;
            margin-bottom: 5px;
            font-weight: bold;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
        }
        .diary-text {
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            color: #2b231c;
            font-weight: 500;
            margin-top: 5px;
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .tip-text {
            font-size: 14px;
            color: #a09184;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
        #exit-btn {
            background-color: var(--exit-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(160, 145, 132, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 20px;
        }
        #exit-btn:hover {
            background-color: #8c7664;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 나의 목소리 일기장</h1>
    
    <div class="pill-container">
        <div class="pill-title">💊 오늘 약 챙겨 드셨나요? (터치하여 체크)</div>
        <div class="pill-buttons">
            <button class="pill-btn" id="pill-morning" onclick="togglePill('morning')">☀️ 아침</button>
            <button class="pill-btn" id="pill-lunch" onclick="togglePill('lunch')">🌤️ 점심</button>
            <button class="pill-btn" id="pill-dinner" onclick="togglePill('dinner')">🌙 저녁</button>
        </div>
    </div>
    
    <div class="btn-box">
        <button id="record-btn">🎤 눌러서 말하기</button>
        
        <div class="photo-upload-box">
            <label for="diary-photo-input" class="photo-upload-label">📷 메모지/풍경 사진 첨부하기</label>
            <input type="file" id="diary-photo-input" class="photo-file-input" accept="image/*" onchange="previewImage(event)">
        </div>
        <div id="photo-preview-wrap" style="display:none;" class="photo-preview-container">
            <img id="image-preview" class="photo-preview" src="" alt="미리보기">
            <button onclick="removeImage()" style="background:none; border:none; color:red; cursor:pointer; font-size:13px; display:block; margin:8px auto; font-weight:bold;">❌ 첨부 사진 취소</button>
        </div>

        <button id="save-btn" onclick="manualSaveDiary()">💾 이 내용으로 일기 저장</button>
    </div>
    
    <div id="text-output" contenteditable="true" placeholder="여기에 말한 내용이 글자로 나타납니다... 잘못 받아적은 부분은 터치해서 직접 고칠 수 있습니다."></div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
    
    <div class="filter-container">
        <button class="filter-btn active" id="filter-all" onclick="changeFilter('all')">전체보기</button>
        <button class="filter-btn" id="filter-week" onclick="changeFilter('week')">1주일보기</button>
        <button class="filter-btn" id="filter-month" onclick="changeFilter('month')">1달보기</button>
    </div>

    <p class="tip-text">💡 아래 저장된 일기 내용과 [날짜]도 터치하면 바로 수정할 수 있습니다!</p>
    <div class="diary-list" id="diary-list"></div>
    
    <button id="exit-btn" onclick="closeApp()">🔒 일기장 안전하게 잠그기</button>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const saveBtn = document.getElementById('save-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');

    let recognition;
    let isRecording = false;
    let shouldRestart = true; 
    let accumulatedText = '';
    let currentFilter = 'all';
    let currentPhotoBase64 = null;

    function getTodayStr() {
        const now = new Date();
        return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    }

    function loadPillState() {
        const savedDate = localStorage.getItem('pillDate');
        const today = getTodayStr();
        if (savedDate !== today) {
            localStorage.setItem('pillDate', today);
            localStorage.setItem('pillState', JSON.stringify({ morning: false, lunch: false, dinner: false }));
        }
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        updatePillButton('morning', state.morning, '☀️ 아침');
        updatePillButton('lunch', state.lunch, '🌤️ 점심');
        updatePillButton('dinner', state.dinner, '🌙 저녁');
    }

    function updatePillButton(type, isTaken, label) {
        const btn = document.getElementById(`pill-${type}`);
        if (isTaken) {
            btn.classList.add('taken');
            btn.innerHTML = `✅ ${label.split(' ')[1]}`;
        } else {
            btn.classList.remove('taken');
            btn.innerHTML = label;
        }
    }

    function togglePill(type) {
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        state[type] = !state[type];
        localStorage.setItem('pillState', JSON.stringify(state));
        const labels = { morning: '☀️ 아침', lunch: '🌤️ 점심', dinner: '🌙 저녁' };
        updatePillButton(type, state[type], labels[type]);
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentPhotoBase64 = e.target.result;
                const previewImg = document.getElementById('image-preview');
                previewImg.src = currentPhotoBase64;
                document.getElementById('photo-preview-wrap').style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    function removeImage() {
        currentPhotoBase64 = null;
        document.getElementById('diary-photo-input').value = '';
        document.getElementById('photo-preview-wrap').style.display = 'none';
        document.getElementById('image-preview').src = '';
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false; 
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 말하기 완료 (터치)';
            recordBtn.classList.add('recording');
            if(!accumulatedText) {
                textOutput.innerText = '귀 기울여 듣고 있습니다... 편하게 말씀하세요.';
            }
            saveBtn.style.display = 'none';
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            if (isRecording) stopRecording(); 
        };

        recognition.onend = () => {
            if (shouldRestart && isRecording) {
                recognition.start();
            } else {
                stopRecording();
                const resultText = accumulatedText.trim();
                if (resultText.length > 0 || currentPhotoBase64) {
                    if (resultText.length > 0) textOutput.innerText = resultText;
                    saveBtn.style.display = 'block'; 
                } else {
                    textOutput.innerText = '인식된 목소리가 없습니다. 다시 시도해 주세요.';
                    saveBtn.style.display = 'none';
                }
            }
        };

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const speechText = event.results[i][0].transcript.trim();
                    if (speechText.length > 0 && !accumulatedText.includes(speechText)) {
                        accumulatedText += speechText + ' ';
                        textOutput.innerText = accumulatedText.trim();
                        saveBtn.style.display = 'block';
                    }
                }
            }
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.innerText = '이 브라우저는 음성 인식을 지원하지 않습니다.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 눌러서 말하기';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            shouldRestart = false; 
            recognition.stop();
        } else {
            shouldRestart = true;
            accumulatedText = '';
            recognition.start();
        }
    });

    function manualSaveDiary() {
        const text = textOutput.innerText.trim();
        if (!text && !currentPhotoBase64) {
            return;
        }

        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        const now = new Date();
        const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분`;
        
        diaries.unshift({ 
            id: Date.now(), 
            date: dateStr, 
            content: text,
            photo: currentPhotoBase64,
            timestamp: Date.now()
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
        
        textOutput.innerText = '';
        removeImage();
        saveBtn.style.display = 'none';
        
        displayDiaries();
    }

    function updateField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.map(item => {
            if (item.id === id) return { ...item, [field]: value.trim() };
            return item;
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
    }

    function deleteDiary(id) {
        if (confirm('이 일기를 삭제하시겠습니까?')) {
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(item => item.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            displayDiaries();
        }
    }

    function changeFilter(filterType) {
        currentFilter = filterType;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`filter-${filterType}`).classList.add('active');
        displayDiaries();
    }

    function displayDiaries() {
        diaryList.innerHTML = '';
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        
        const now = Date.now();
        const oneWeek = 7 * 24 * 60 * 60 * 1000;
        const oneMonth = 30 * 24 * 60 * 60 * 1000;

        if (currentFilter === 'week') {
            diaries = diaries.filter(item => (now - (item.timestamp || item.id)) <= oneWeek);
        } else if (currentFilter === 'month') {
            diaries = diaries.filter(item => (now - (item.timestamp || item.id)) <= oneMonth);
        }
        
        diaries.forEach(item => {
            const diaryItem = document.createElement('div');
            diaryItem.className = 'diary-item';
            
            // 💡 [수정됨] 텍스트가 먼저 나오고, 사진(photoHtml)이 아래쪽으로 정렬되도록 순서 변경!
            const photoHtml = item.photo ? `<img src="${item.photo}" class="diary-photo" alt="일기 사진">` : '';

            diaryItem.innerHTML = `
                <div>
                    <div class="diary-date" contenteditable="true" data-id="${item.id}">${item.date}</div>
                </div>
                <div class="diary-text" contenteditable="true" data-id="${item.id}">${item.content}</div>
                ${photoHtml}
                <button class="delete-btn" onclick="deleteDiary(${item.id})">❌ 삭제</button>
            `;
            diaryList.appendChild(diaryItem);
        });

        document.querySelectorAll('.diary-date').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'date', this.innerText);
            });
        });

        document.querySelectorAll('.diary-text').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'content', this.innerText);
            });
        });
    }

    function closeApp() {
        shouldRestart = false;
        if (recognition && isRecording) {
            recognition.stop();
        }
        accumulatedText = '';
        textOutput.innerText = '';
        removeImage();
        saveBtn.style.display = 'none';
        
        alert("🔒 마이크가 꺼졌으며 일기 창이 안전하게 정리되었습니다. 이제 스마트폰 홈 버튼을 누르고 나가하시면 됩니다!");
    }

    loadPillState();
    displayDiaries();
</script>

</body>
</html>
