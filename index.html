<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 메모장</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --save-color: #4da6ff;
            --save-hover: #358be6;
            --border-color: #eaddd3;
            --pill-success: #2eb82e;
            --exit-color: #a09184;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
            color: #d17377;
        }
        .pill-container {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .pill-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #8c7664;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .pill-buttons {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .pill-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
            color: #777;
        }
        .pill-btn.taken {
            background-color: #e6f7e6;
            border-color: var(--pill-success);
            color: var(--pill-success);
        }
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .action-row {
            display: flex;
            gap: 10px;
        }
        #record-btn {
            flex: 1;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 142, 148, 0.4);
            transition: all 0.2s ease;
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 10px rgba(179, 162, 151, 0.4);
        }
        .photo-upload-box {
            flex: 1;
            display: flex;
        }
        .photo-file-input {
            display: none;
        }
        .photo-upload-label {
            flex: 1;
            background-color: #f1e4d8;
            color: #5c4d40;
            padding: 15px 10px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(241, 228, 216, 0.4);
        }
        .photo-upload-label:hover {
            background-color: #e5d4c3;
        }
        #save-btn {
            background-color: var(--save-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(77, 166, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            display: none;
        }
        #save-btn:hover {
            background-color: var(--save-hover);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        #text-output {
            width: 100%;
            min-height: 120px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 22px;
            line-height: 1.6;
            background-color: #fffdfb;
            color: #2b231c;
            outline: none;
        }
        #text-output:focus {
            border-style: solid;
            border-color: var(--save-color);
        }
        .photo-preview-container {
            margin-top: 10px;
            position: relative;
            text-align: center;
        }
        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .diary-photo {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 12px;
            display: block;
            border: 1px solid var(--border-color);
        }

        #exit-btn {
            background-color: var(--exit-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(160, 145, 132, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 20px;
        }
        #exit-btn:hover {
            background-color: #8c7664;
        }

        /* 💡 캘린더 스타일 */
        .calendar-box {
            background: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 12px;
        }
        .cal-nav-btn {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-weight: bold;
            color: #8c7664;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .cal-day-name {
            font-size: 13px;
            font-weight: bold;
            color: #a09184;
            padding-bottom: 5px;
        }
        .cal-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            position: relative;
            border: 1px solid #f0e6df;
            color: #4a3f35;
        }
        .cal-cell.empty {
            background: transparent;
            border: none;
            cursor: default;
        }
        .cal-cell.has-memo {
            background-color: #fff0eb;
            font-weight: bold;
            border-color: #ffb3a7;
        }
        .cal-cell.selected {
            background-color: var(--primary-color) !important;
            color: white !important;
            border-color: var(--primary-hover) !important;
        }
        .memo-dot {
            width: 5px;
            height: 5px;
            background-color: #ff5252;
            border-radius: 50%;
            margin-top: 2px;
        }
        .cal-cell.selected .memo-dot {
            background-color: white;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .filter-btn {
            padding: 8px 16px;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: white;
            color: #8c7664;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background-color: #8c7664;
            color: white;
            border-color: #8c7664;
        }
        .diary-list {
            margin-top: 10px;
        }
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .diary-date {
            font-size: 16px;
            color: #a09184;
            margin-bottom: 5px;
            font-weight: bold;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
        }
        .diary-text {
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            color: #2b231c;
            font-weight: 500;
            margin-top: 5px;
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .tip-text {
            font-size: 14px;
            color: #a09184;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 스마트 메모장</h1>
    
    <div class="pill-container">
        <div class="pill-title">💊 오늘 약 챙겨 드셨나요? (터치하여 체크)</div>
        <div class="pill-buttons">
            <button class="pill-btn" id="pill-morning" onclick="togglePill('morning')">☀️ 아침</button>
            <button class="pill-btn" id="pill-lunch" onclick="togglePill('lunch')">🌤️ 점심</button>
            <button class="pill-btn" id="pill-dinner" onclick="togglePill('dinner')">🌙 저녁</button>
        </div>
    </div>
    
    <div class="btn-box">
        <div class="action-row">
            <button id="record-btn">🎤 말하기</button>
            
            <div class="photo-upload-box">
                <label for="diary-photo-input" class="photo-upload-label">📷 사진첨부</label>
                <input type="file" id="diary-photo-input" class="photo-file-input" accept="image/*" onchange="previewImage(event)">
            </div>
        </div>

        <div id="photo-preview-wrap" style="display:none;" class="photo-preview-container">
            <img id="image-preview" class="photo-preview" src="" alt="미리보기">
            <button onclick="removeImage()" style="background:none; border:none; color:red; cursor:pointer; font-size:13px; display:block; margin:8px auto; font-weight:bold;">❌ 첨부 사진 취소</button>
        </div>

        <button id="save-btn" onclick="manualSaveDiary()">💾 이 내용으로 메모 저장</button>
    </div>
    
    <div id="text-output" contenteditable="true" placeholder="여기에 말한 내용이 나타나거나 직접 글을 쓸 수 있습니다... 수정할 부분은 터치해서 바로 고치세요."></div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
    
    <!-- 💡 달력 UI 추가 -->
    <div class="calendar-box">
        <div class="cal-header">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">◀ 이전</button>
            <span id="cal-month-title">2026년 7월</span>
            <button class="cal-nav-btn" onclick="changeMonth(1)">다음 ▶</button>
        </div>
        <div class="cal-grid">
            <div class="cal-day-name" style="color:#ff5252;">일</div>
            <div class="cal-day-name">월</div>
            <div class="cal-day-name">화</div>
            <div class="cal-day-name">수</div>
            <div class="cal-day-name">목</div>
            <div class="cal-day-name">금</div>
            <div class="cal-day-name" style="color:#4da6ff;">토</div>
        </div>
        <div class="cal-grid" id="cal-days-grid" style="margin-top: 5px;"></div>
    </div>

    <button id="exit-btn" onclick="closeApp()">🔒 메모장 안전하게 잠그기</button>

    <div class="filter-container">
        <button class="filter-btn active" id="filter-all" onclick="changeFilter('all')">전체보기</button>
        <button class="filter-btn" id="filter-week" onclick="changeFilter('week')">1주일보기</button>
        <button class="filter-btn" id="filter-month" onclick="changeFilter('month')">1달보기</button>
    </div>

    <p class="tip-text">💡 달력의 날짜를 누르면 해당 날짜의 메모만 모아볼 수 있습니다!</p>
    <div class="diary-list" id="diary-list"></div>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const saveBtn = document.getElementById('save-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');

    let recognition;
    let isRecording = false;
    let shouldRestart = true; 
    let accumulatedText = '';
    let currentFilter = 'all';
    let selectedDateStr = null; // 달력에서 선택한 특정 날짜 (예: "2026-7-21")
    let currentPhotoBase64 = null;

    // 캘린더용 현재 표시 연/월
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    function getTodayStr() {
        const now = new Date();
        return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    }

    function loadPillState() {
        const savedDate = localStorage.getItem('pillDate');
        const today = getTodayStr();
        if (savedDate !== today) {
            localStorage.setItem('pillDate', today);
            localStorage.setItem('pillState', JSON.stringify({ morning: false, lunch: false, dinner: false }));
        }
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        updatePillButton('morning', state.morning, '☀️ 아침');
        updatePillButton('lunch', state.lunch, '🌤️ 점심');
        updatePillButton('dinner', state.dinner, '🌙 저녁');
    }

    function updatePillButton(type, isTaken, label) {
        const btn = document.getElementById(`pill-${type}`);
        if (isTaken) {
            btn.classList.add('taken');
            btn.innerHTML = `✅ ${label.split(' ')[1]}`;
        } else {
            btn.classList.remove('taken');
            btn.innerHTML = label;
        }
    }

    function togglePill(type) {
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        state[type] = !state[type];
        localStorage.setItem('pillState', JSON.stringify(state));
        const labels = { morning: '☀️ 아침', lunch: '🌤️ 점심', dinner: '🌙 저녁' };
        updatePillButton(type, state[type], labels[type]);
    }

    textOutput.addEventListener('input', () => {
        const text = textOutput.innerText.trim();
        const isDefaultText = text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다');
        
        if ((text.length > 0 && !isDefaultText) || currentPhotoBase64) {
            saveBtn.style.display = 'block';
        } else {
            saveBtn.style.display = 'none';
        }
    });

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 600; 

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const previewImg = document.getElementById('image-preview');
                    previewImg.src = currentPhotoBase64;
                    document.getElementById('photo-preview-wrap').style.display = 'block';
                    saveBtn.style.display = 'block'; 
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    function removeImage() {
        currentPhotoBase64 = null;
        document.getElementById('diary-photo-input').value = '';
        document.getElementById('photo-preview-wrap').style.display = 'none';
        document.getElementById('image-preview').src = '';
        
        const text = textOutput.innerText.trim();
        if(!text || text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다')) {
            saveBtn.style.display = 'none';
        }
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false; 
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 완료';
            recordBtn.classList.add('recording');
            if(!accumulatedText) {
                textOutput.innerText = '귀 기울여 듣고 있습니다... 편하게 말씀하세요.';
            }
            saveBtn.style.display = 'none';
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            if (isRecording) stopRecording(); 
        };

        recognition.onend = () => {
            if (shouldRestart && isRecording) {
                recognition.start();
            } else {
                stopRecording();
                const resultText = accumulatedText.trim();
                if (resultText.length > 0 || currentPhotoBase64) {
                    if (resultText.length > 0) textOutput.innerText = resultText;
                    saveBtn.style.display = 'block'; 
                } else {
                    textOutput.innerText = '인식된 목소리가 없습니다. 다시 시도해 주세요.';
                    saveBtn.style.display = 'none';
                }
            }
        };

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const speechText = event.results[i][0].transcript.trim();
                    if (speechText.length > 0 && !accumulatedText.includes(speechText)) {
                        accumulatedText += speechText + ' ';
                        textOutput.innerText = accumulatedText.trim();
                        saveBtn.style.display = 'block';
                    }
                }
            }
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.innerText = '이 브라우저는 음성 인식을 지원하지 않습니다.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 말하기';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            shouldRestart = false; 
            recognition.stop();
        } else {
            shouldRestart = true;
            accumulatedText = '';
            recognition.start();
        }
    });

    function manualSaveDiary() {
        const text = textOutput.innerText.trim();
        const isDefaultText = text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다');
        const cleanText = isDefaultText ? '' : text;

        if (!cleanText && !currentPhotoBase64) {
            return;
        }

        try {
            const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            const now = new Date();
            // yyyy년 m월 d일 형식과 점검용 yyyy-m-d 객체용 날짜 함께 저장
            const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분`;
            const simpleDateStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
            
            diaries.unshift({ 
                id: Date.now(), 
                date: dateStr, 
                simpleDate: simpleDateStr,
                content: cleanText,
                photo: currentPhotoBase64,
                timestamp: Date.now()
            });
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            
            textOutput.innerText = '';
            removeImage();
            saveBtn.style.display = 'none';
            
            renderCalendar();
            displayDiaries();
        } catch(e) {
            alert('사진 용량이 너무 큽니다. 다른 사진을 선택해주세요.');
        }
    }

    function updateField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.map(item => {
            if (item.id === id) return { ...item, [field]: value.trim() };
            return item;
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
    }

    function deleteDiary(id) {
        if (confirm('이 메모를 삭제하시겠습니까?')) {
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(item => item.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            renderCalendar();
            displayDiaries();
        }
    }

    function changeFilter(filterType) {
        selectedDateStr = null; // 필터 누르면 달력 선택 해제
        currentFilter = filterType;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`filter-${filterType}`).classList.add('active');
        renderCalendar();
        displayDiaries();
    }

    // 캘린더 월 이동
    function changeMonth(direction) {
        calMonth += direction;
        if (calMonth > 11) {
            calMonth = 0;
            calYear++;
        } else if (calMonth < 0) {
            calMonth = 11;
            calYear--;
        }
        renderCalendar();
    }

    // 캘린더 렌더링
    function renderCalendar() {
        document.getElementById('cal-month-title').innerText = `${calYear}년 ${calMonth + 1}월`;
        const grid = document.getElementById('cal-days-grid');
        grid.innerHTML = '';

        const firstDayIndex = new Date(calYear, calMonth, 1).getDay();
        const totalDays = new Date(calYear, calMonth + 1, 0).getDate();

        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        // 메모가 있는 날짜 세트 만들기 ("yyyy-m-d")
        const memoDates = new Set();
        diaries.forEach(item => {
            if (item.simpleDate) {
                memoDates.add(item.simpleDate);
            } else if (item.date) {
                // 구버전 데이터 호환용 파싱
                const match = item.date.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
                if (match) {
                    memoDates.add(`${match[1]}-${match[2]}-${match[3]}`);
                }
            }
        });

        // 빈 칸 채우기 (첫 날 시작요일 맞춤)
        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'cal-cell empty';
            grid.appendChild(emptyCell);
        }

        // 날짜 칸 채우기
        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'cal-cell';
            const thisDateStr = `${calYear}-${calMonth + 1}-${day}`;
            
            let htmlContent = `<span>${day}</span>`;
            if (memoDates.has(thisDateStr)) {
                cell.classList.add('has-memo');
                htmlContent += `<div class="memo-dot"></div>`;
            }

            if (selectedDateStr === thisDateStr) {
                cell.classList.add('selected');
            }

            cell.innerHTML = htmlContent;
            
            // 날짜 클릭 이벤트
            cell.addEventListener('click', () => {
                if (selectedDateStr === thisDateStr) {
                    selectedDateStr = null; // 다시 누르면 선택 해제 (전체보기로 복귀)
                } else {
                    selectedDateStr = thisDateStr;
                    // 필터 버튼 활성화 해제
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                }
                renderCalendar();
                displayDiaries();
            });

            grid.appendChild(cell);
        }
    }

    function displayDiaries() {
        diaryList.innerHTML = '';
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        
        const now = Date.now();
        const oneWeek = 7 * 24 * 60 * 60 * 1000;
        const oneMonth = 30 * 24 * 60 * 60 * 1000;

        // 1. 달력에서 날짜를 선택한 경우 해당 날짜 메모만 필터링
        if (selectedDateStr) {
            diaries = diaries.filter(item => {
                if (item.simpleDate === selectedDateStr) return true;
                if (item.date) {
                    const match = item.date.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
                    if (match && `${match[1]}-${match[2]}-${match[3]}` === selectedDateStr) return true;
                }
                return false;
            });
        } else {
            // 2. 상단 필터 적용
            if (currentFilter === 'week') {
                diaries = diaries.filter(item => (now - (item.timestamp || item.id)) <= oneWeek);
            } else if (currentFilter === 'month') {
                diaries = diaries.filter(item => (now - (item.timestamp || item.id)) <= oneMonth);
            }
        }
        
        if (diaries.length === 0) {
            diaryList.innerHTML = `<div style="text-align:center; color:#a09184; padding:20px; font-size:16px;">해당하는 메모가 없습니다.</div>`;
            return;
        }

        diaries.forEach(item => {
            const diaryItem = document.createElement('div');
            diaryItem.className = 'diary-item';
            
            const photoHtml = item.photo ? `<img src="${item.photo}" class="diary-photo" alt="메모 사진">` : '';

            diaryItem.innerHTML = `
                <div>
                    <div class="diary-date" contenteditable="true" data-id="${item.id}">${item.date}</div>
                </div>
                <div class="diary-text" contenteditable="true" data-id="${item.id}">${item.content}</div>
                ${photoHtml}
                <button class="delete-btn" onclick="deleteDiary(${item.id})">❌ 삭제</button>
            `;
            diaryList.appendChild(diaryItem);
        });

        document.querySelectorAll('.diary-date').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'date', this.innerText);
            });
        });

        document.querySelectorAll('.diary-text').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'content', this.innerText);
            });
        });
    }

    function closeApp() {
        shouldRestart = false;
        if (recognition && isRecording) {
            recognition.stop();
        }
        accumulatedText = '';
        textOutput.innerText = '';
        removeImage();
        saveBtn.style.display = 'none';
        
        alert("🔒 마이크가 꺼졌으며 메모 창이 안전하게 정리되었습니다. 이제 스마트폰 홈 버튼을 누르고 나가하시면 됩니다!");
    }

    loadPillState();
    renderCalendar();
    displayDiaries();
</script>

</body>
</html>
