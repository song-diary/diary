<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 목소리 건강 일기장</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --save-color: #4da6ff;
            --save-hover: #358be6;
            --border-color: #eaddd3;
            --pill-success: #2eb82e;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
            color: #d17377;
        }
        .pill-container {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .pill-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #8c7664;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .pill-buttons {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .pill-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
            color: #777;
        }
        .pill-btn.taken {
            background-color: #e6f7e6;
            border-color: var(--pill-success);
            color: var(--pill-success);
        }
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        #record-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 142, 148, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 10px rgba(179, 162, 151, 0.4);
        }
        /* 💾 저장 버튼 스타일 추가 */
        #save-btn {
            background-color: var(--save-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(77, 166, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            display: none; /* 평소에는 안 보이다가 글자가 입력되면 등장 */
        }
        #save-btn:hover {
            background-color: var(--save-hover);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        /* 글자 확인 및 편집창을 직접 수정 가능하게 바꿈 */
        #text-output {
            width: 100%;
            min-height: 120px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 22px;
            line-height: 1.6;
            background-color: #fffdfb;
            color: #2b231c;
            outline: none;
        }
        #text-output:focus {
            border-style: solid;
            border-color: var(--save-color);
        }
        .diary-list {
            margin-top: 10px;
        }
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .diary-date {
            font-size: 16px;
            color: #a09184;
            margin-bottom: 5px;
            font-weight: bold;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
        }
        .diary-date:focus {
            background-color: #f7f1eb;
            border-color: var(--primary-color);
        }
        .diary-pill-tag {
            font-size: 13px;
            color: var(--pill-success);
            background-color: #e6f7e6;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 5px;
            display: inline-block;
        }
        .diary-text {
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            color: #2b231c;
            font-weight: 500;
            margin-top: 5px;
        }
        .diary-text:focus {
            background-color: #f7f1eb;
            border-color: var(--primary-color);
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .tip-text {
            font-size: 14px;
            color: #a09184;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 나의 목소리 일기장</h1>
    
    <div class="pill-container">
        <div class="pill-title">💊 오늘 약 챙겨 드셨나요? (터치하여 체크)</div>
        <div class="pill-buttons">
            <button class="pill-btn" id="pill-morning" onclick="togglePill('morning')">☀️ 아침</button>
            <button class="pill-btn" id="pill-lunch" onclick="togglePill('lunch')">🌤️ 점심</button>
            <button class="pill-btn" id="pill-dinner" onclick="togglePill('dinner')">🌙 저녁</button>
        </div>
    </div>
    
    <div class="btn-box">
        <button id="record-btn">🎤 눌러서 말하기</button>
        <!-- 💾 수동 저장 버튼 추가 -->
        <button id="save-btn" onclick="manualSaveDiary()">💾 이 내용으로 일기 저장</button>
    </div>
    
    <!-- 터치해서 직접 편집할 수 있도록 contenteditable="true" 적용 -->
    <div id="text-output" contenteditable="true" placeholder="여기에 말한 내용이 글자로 나타납니다... 잘못 받아적은 부분은 터치해서 직접 고칠 수 있습니다."></div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
    
    <p class="tip-text">💡 아래 저장된 일기 내용과 [날짜]도 터치하면 바로 수정할 수 있습니다!</p>
    <div class="diary-list" id="diary-list"></div>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const saveBtn = document.getElementById('save-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');

    let recognition;
    let isRecording = false;
    let finalPhrases = new Set();

    function getTodayStr() {
        const now = new Date();
        return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    }

    function loadPillState() {
        const savedDate = localStorage.getItem('pillDate');
        const today = getTodayStr();
        if (savedDate !== today) {
            localStorage.setItem('pillDate', today);
            localStorage.setItem('pillState', JSON.stringify({ morning: false, lunch: false, dinner: false }));
        }
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        updatePillButton('morning', state.morning, '☀️ 아침');
        updatePillButton('lunch', state.lunch, '🌤️ 점심');
        updatePillButton('dinner', state.dinner, '🌙 저녁');
    }

    function updatePillButton(type, isTaken, label) {
        const btn = document.getElementById(`pill-${type}`);
        if (isTaken) {
            btn.classList.add('taken');
            btn.innerHTML = `✅ ${label.split(' ')[1]}`;
        } else {
            btn.classList.remove('taken');
            btn.innerHTML = label;
        }
    }

    function togglePill(type) {
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        state[type] = !state[type];
        localStorage.setItem('pillState', JSON.stringify(state));
        const labels = { morning: '☀️ 아침', lunch: '🌤️ 점심', dinner: '🌙 저녁' };
        updatePillButton(type, state[type], labels[type]);
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 말하기 완료 (터치)';
            recordBtn.classList.add('recording');
            textOutput.innerText = '듣고 있습니다... 말씀을 시작하세요.';
            saveBtn.style.display = 'none'; // 녹음 시작할 땐 저장 단추 숨김
            finalPhrases.clear();
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            stopRecording();
        };

        recognition.onend = () => {
            stopRecording();
            const currentText = textOutput.innerText.trim();
            if (currentText.length > 0 && currentText !== '듣고 있습니다... 말씀을 시작하세요.' && currentText !== '인식된 목소리가 없습니다. 다시 시도해 주세요.') {
                saveBtn.style.display = 'block'; // 녹음이 끝나면 눈으로 확인하고 저장하라고 단추 띄움
            } else {
                textOutput.innerText = '인식된 목소리가 없습니다. 다시 시도해 주세요.';
                saveBtn.style.display = 'none';
            }
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const speechText = event.results[i][0].transcript.trim();
                if (event.results[i].isFinal) {
                    if (speechText.length > 0) finalPhrases.add(speechText);
                } else {
                    interimTranscript = speechText;
                }
            }
            const combinedFinal = Array.from(finalPhrases).join(' ');
            if (combinedFinal || interimTranscript) {
                textOutput.innerText = (combinedFinal + ' ' + interimTranscript).trim();
            }
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.innerText = '이 브라우저는 음성 인식을 지원하지 않습니다.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 눌러서 말하기';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    // [핵심 변경] 사용자가 직접 저장 버튼을 눌러야만 저장되는 수동 저장 함수
    function manualSaveDiary() {
        const text = textOutput.innerText.trim();
        if (!text) {
            alert('내용이 없습니다.');
            return;
        }

        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        const now = new Date();
        const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분`;
        
        const pillState = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        let pillHistory = '';
        const takenList = [];
        if (pillState.morning) takenList.push('아침');
        if (pillState.lunch) takenList.push('점심');
        if (pillState.dinner) takenList.push('저녁');
        
        if (takenList.length > 0) {
            pillHistory = `💊 복용 완료: ${takenList.join(', ')}`;
        }
        
        diaries.unshift({ 
            id: Date.now(), 
            date: dateStr, 
            content: text,
            pills: pillHistory
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
        
        // 저장 후 창 깨끗하게 비우고 저장버튼 숨기기
        textOutput.innerText = '';
        saveBtn.style.display = 'none';
        
        displayDiaries();
        alert('일기가 안전하게 저장되었습니다!');
    }

    function updateField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.map(item => {
            if (item.id === id) return { ...item, [field]: value.trim() };
            return item;
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
    }

    function deleteDiary(id) {
        if (confirm('이 일기를 삭제하시겠습니까?')) {
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(item => item.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            displayDiaries();
        }
    }

    function displayDiaries() {
        diaryList.innerHTML = '';
        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        
        diaries.forEach(item => {
            const diaryItem = document.createElement('div');
            diaryItem.className = 'diary-item';
            const pillTag = item.pills ? `<span class="diary-pill-tag">${item.pills}</span>` : '';
            
            diaryItem.innerHTML = `
                <div>
                    <div class="diary-date" contenteditable="true" data-id="${item.id}">${item.date}</div>
                    ${pillTag}
                </div>
                <div class="diary-text" contenteditable="true" data-id="${item.id}">${item.content}</div>
                <button class="delete-btn" onclick="deleteDiary(${item.id})">❌ 삭제</button>
            `;
            diaryList.appendChild(diaryItem);
        });

        document.querySelectorAll('.diary-date').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'date', this.innerText);
            });
        });

        document.querySelectorAll('.diary-text').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'content', this.innerText);
            });
        });
    }

    loadPillState();
    displayDiaries();
</script>

</body>
</html>
