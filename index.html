<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 목소리 건강 일기장</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --save-color: #4da6ff;
            --save-hover: #358be6;
            --border-color: #eaddd3;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 25px;
            color: #d17377;
        }
        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        #record-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 142, 148, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 10px rgba(179, 162, 151, 0.4);
        }
        #save-btn {
            background-color: var(--save-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(77, 166, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            display: none;
        }
        #save-btn:hover {
            background-color: var(--save-hover);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        #text-output {
            width: 100%;
            min-height: 120px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 22px;
            line-height: 1.6;
            background-color: #fffdfb;
            color: #2b231c;
            outline: none;
        }
        #text-output:focus {
            border-style: solid;
            border-color: var(--save-color);
        }
        .diary-list {
            margin-top: 10px;
        }
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .diary-date {
            font-size: 16px;
            color: #a09184;
            margin-bottom: 5px;
            font-weight: bold;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
        }
        .diary-date:focus {
            background-color: #f7f1eb;
            border-color: var(--primary-color);
        }
        .diary-text {
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            color: #2b231c;
            font-weight: 500;
            margin-top: 5px;
        }
        .diary-text:focus {
            background-color: #f7f1eb;
            border-color: var(--primary-color);
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .tip-text {
            font-size: 14px;
            color: #a09184;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 나의 목소리 일기장</h1>
    
    <div class="btn-box">
        <button id="record-btn">🎤 눌러서 말하기</button>
        <button id="save-btn" onclick="manualSaveDiary()">💾 이 내용으로 일기 저장</button>
    </div>
    
    <div id="text-output" contenteditable="true" placeholder="여기에 말한 내용이 글자로 나타납니다... 잘못 받아적은 부분은 터치해서 직접 고칠 수 있습니다."></div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
    
    <p class="tip-text">💡 아래 저장된 일기 내용과 [날짜]도 터치하면 바로 수정할 수 있습니다!</p>
    <div class="diary-list" id="diary-list"></div>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const saveBtn = document.getElementById('save-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');

    let recognition;
    let isRecording = false;
    let accumulatedText = ''; // 중복 축적을 막기 위한 텍스트 저장소

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        // [핵심 변경] 실시간 중간 결과를 끄고 완전히 끝난 문장만 정제해서 받음
        recognition.interimResults = false; 
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 말하기 완료 (터치)';
            recordBtn.classList.add('recording');
            textOutput.innerText = '음성을 부드럽게 인식하고 있습니다... 편하게 말씀하세요.';
            saveBtn.style.display = 'none';
            accumulatedText = '';
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            stopRecording();
        };

        recognition.onend = () => {
            stopRecording();
            const resultText = accumulatedText.trim();
            if (resultText.length > 0) {
                textOutput.innerText = resultText;
                saveBtn.style.display = 'block'; 
            } else {
                textOutput.innerText = '인식된 목소리가 없습니다. 다시 시도해 주세요.';
                saveBtn.style.display = 'none';
            }
        };

        recognition.onresult = (event) => {
            // 안드로이드 브라우저의 뜸들이기 중복을 막기 위해 철저히 마지막 결과문장만 순치 취합
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const speechText = event.results[i][0].transcript.trim();
                    // 이전 문장과 완전히 똑같은 문장이 연속으로 들어오면 필터링
                    if (speechText.length > 0 && !accumulatedText.includes(speechText)) {
                        accumulatedText += speechText + ' ';
                    }
                }
            }
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.innerText = '이 브라우저는 음성 인식을 지원하지 않습니다.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 눌러서 말하기';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    function manualSaveDiary() {
        const text = textOutput.innerText.trim();
        if (!text) {
            alert('내용이 없습니다.');
            return;
        }

        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        const now = new Date();
        const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분`;
        
        // 💊 알약 상태 체크 및 리스트 표시 로직 완전 삭제 (깔끔화)
        diaries.unshift({ 
            id: Date.now(), 
            date: dateStr, 
            content: text
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
        
        textOutput.innerText = '';
        saveBtn.style.display = 'none';
        
        displayDiaries();
        alert('일기가 안전하게 저장되었습니다!');
    }

    function updateField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.map(item => {
            if (item.id === id) return { ...item, [field]: value.trim() };
            return item;
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
    }

    function deleteDiary(id) {
        if (confirm('이 일기를 삭제하시겠습니까?')) {
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(item => item.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            displayDiaries();
        }
    }

    function displayDiaries() {
        diaryList.innerHTML = '';
        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        
        diaries.forEach(item => {
            const diaryItem = document.createElement('div');
            diaryItem.className = 'diary-item';
            
            // 알약 태그 부분 완전히 들어내어 UI를 깔끔하게 변경
            diaryItem.innerHTML = `
                <div>
                    <div class="diary-date" contenteditable="true" data-id="${item.id}">${item.date}</div>
                </div>
                <div class="diary-text" contenteditable="true" data-id="${item.id}">${item.content}</div>
                <button class="delete-btn" onclick="deleteDiary(${item.id})">❌ 삭제</button>
            `;
            diaryList.appendChild(diaryItem);
        });

        document.querySelectorAll('.diary-date').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'date', this.innerText);
            });
        });

        document.querySelectorAll('.diary-text').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'content', this.innerText);
            });
        });
    }

    displayDiaries();
</script>

</body>
</html>
