<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 목소리 일기장</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --border-color: #eaddd3;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 25px;
            color: #d17377;
        }
        .btn-box {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        #record-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 142, 148, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }
        #record-btn:hover {
            background-color: var(--primary-hover);
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 10px rgba(179, 162, 151, 0.4);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        #text-output {
            width: 100%;
            min-height: 100px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 20px;
            line-height: 1.6;
            background-color: #fffdfb;
        }
        .diary-list {
            margin-top: 10px;
        }
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .diary-date {
            font-size: 16px;
            color: #a09184;
            margin-bottom: 10px;
            font-weight: bold;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            outline: none;
        }
        .diary-date:focus {
            background-color: #f7f1eb;
            border-color: var(--primary-color);
        }
        .diary-text {
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
            outline: none;
            color: #2b231c;
            font-weight: 500;
        }
        .diary-text:focus {
            background-color: #f7f1eb;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(255, 142, 148, 0.2);
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .tip-text {
            font-size: 14px;
            color: #a09184;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 나의 목소리 일기장</h1>
    
    <div class="btn-box">
        <button id="record-btn">🎤 눌러서 말하기</button>
    </div>
    
    <div id="text-output" placeholder="여기에 말한 내용이 글자로 나타납니다..."></div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
    
    <p class="tip-text">💡 저장된 일기 내용과 [날짜]를 터치하면 바로 수정할 수 있습니다!</p>
    <div class="diary-list" id="diary-list"></div>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');

    let recognition;
    let isRecording = false;
    let accumulatedTranscript = ''; // 이미 확정된 문장들을 모아두는 곳

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 말하기 완료 (터치)';
            recordBtn.classList.add('recording');
            textOutput.textContent = '듣고 있습니다... 말씀을 시작하세요.';
            accumulatedTranscript = '';
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            stopRecording();
        };

        recognition.onend = () => {
            stopRecording();
            const text = textOutput.textContent.trim();
            if (text.length > 0 && text !== '듣고 있습니다... 말씀을 시작하세요.' && text !== '인식된 목소리가 없습니다. 다시 시도해 주세요.') {
                saveDiary(text);
                textOutput.textContent = '';
            } else {
                textOutput.textContent = '인식된 목소리가 없습니다. 다시 시도해 주세요.';
            }
        };

        recognition.onresult = (event) => {
            let currentInterim = '';
            let currentFinal = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    currentFinal += event.results[i][0].transcript + ' ';
                } else {
                    currentInterim += event.results[i][0].transcript;
                }
            }
            
            // 텀을 줘서 문장이 새로 끊겨 들어올 때만 누적 창에 보태줍니다.
            if (currentFinal) {
                accumulatedTranscript += currentFinal;
            }

            // 화면에는 여태까지 확정된 말들과 지금 실시간으로 하고 있는 말을 합쳐서 띄웁니다 (실시간 듣기 복구!)
            textOutput.textContent = accumulatedTranscript + currentInterim;
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.textContent = '이 브라우저는 음성 인식을 지원하지 않습니다. 삼성 인터넷이나 크롬을 이용해 주세요.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 눌러서 말하기';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    function saveDiary(text) {
        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        const now = new Date();
        const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${now.getMinutes()}분`;
        
        diaries.unshift({ id: Date.now(), date: dateStr, content: text.trim() });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
        displayDiaries();
    }

    function updateField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.map(item => {
            if (item.id === id) {
                return { ...item, [field]: value.trim() };
            }
            return item;
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
    }

    function deleteDiary(id) {
        if (confirm('이 일기를 삭제하시겠습니까?')) {
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(item => item.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            displayDiaries();
        }
    }

    function displayDiaries() {
        diaryList.innerHTML = '';
        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        
        diaries.forEach(item => {
            const diaryItem = document.createElement('div');
            diaryItem.className = 'diary-item';
            
            diaryItem.innerHTML = `
                <div class="diary-date" contenteditable="true" data-id="${item.id}">${item.date}</div>
                <div class="diary-text" contenteditable="true" data-id="${item.id}">${item.content}</div>
                <button class="delete-btn" onclick="deleteDiary(${item.id})">❌ 삭제</button>
            `;
            
            diaryList.appendChild(diaryItem);
        });

        document.querySelectorAll('.diary-date').forEach(element => {
            element.addEventListener('blur', function() {
                const id = parseInt(this.getAttribute('data-id'));
                const newDate = this.innerText;
                updateField(id, 'date', newDate);
            });
        });

        document.querySelectorAll('.diary-text').forEach(element => {
            element.addEventListener('blur', function() {
                const id = parseInt(this.getAttribute('data-id'));
                const newContent = this.innerText;
                updateField(id, 'content', newContent);
            });
        });
    }

    displayDiaries();
</script>

</body>
</html>
