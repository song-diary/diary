<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 다이어리</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --save-color: #4da6ff;
            --save-hover: #358be6;
            --border-color: #eaddd3;
            --pill-success: #2eb82e;
            
            --date-font-size: 13px;
            --text-font-size: 17px;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin: 0;
            color: #d17377;
        }
        .setting-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 13px;
            cursor: pointer;
            color: #8c7664;
            background-color: #fff9f5;
            font-weight: bold;
        }
        .setting-btn:hover {
            background-color: #f1e4d8;
        }

        .pill-container {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            display: none; 
        }
        .pill-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #8c7664;
        }
        .pill-buttons {
            display: flex;
            justify-content: space-around;
            gap: 8px;
        }
        .pill-btn {
            flex: 1;
            padding: 10px 5px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
            color: #777;
        }
        .pill-btn.taken {
            background-color: #e6f7e6;
            border-color: var(--pill-success);
            color: var(--pill-success);
        }

        .setting-menu-box {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
        }
        .setting-section-title {
            font-size: 14px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 8px;
            display: block;
        }
        .setting-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .setting-row:last-child {
            margin-bottom: 0;
        }
        .setting-action-btn {
            flex: 1;
            background-color: white;
            border: 1px solid var(--border-color);
            color: #6b584a;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .setting-action-btn:hover {
            background-color: #f1e4d8;
        }
        .setting-action-btn.active {
            background-color: #8c7664;
            color: white;
            border-color: #8c7664;
        }

        /* 메인 캘린더 영역 (기존 그대로 유지) */
        .calendar-box {
            background: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            touch-action: pan-y;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 10px;
        }
        .cal-nav-btn {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
            color: #8c7664;
            font-size: 13px;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            text-align: center;
        }
        .cal-day-name {
            font-size: 12px !important;
            font-weight: bold;
            color: #a09184;
            padding-bottom: 4px;
        }
        .cal-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            border: 1px solid #f0e6df;
            color: #4a3f35;
            overflow: hidden;
            box-sizing: border-box;
            padding: 2px;
        }
        .cal-cell span {
            font-size: 14px !important;
            line-height: 1.2;
            font-weight: bold;
        }
        .cal-cell.sunday, .cal-cell.holiday {
            background-color: #fff5f5;
            color: #e63946 !important;
        }
        .cal-cell.sunday span, .cal-cell.holiday span {
            color: #e63946 !important;
        }
        .cal-cell.saturday {
            background-color: #f7fbff;
            color: #337ab7;
        }
        .cal-cell.saturday span {
            color: #337ab7;
        }
        .cal-cell.empty {
            background: transparent;
            border: none;
            cursor: default;
        }
        .cal-cell.today-date {
            background-color: #fffae6 !important;
            border: 2px solid #ffb800 !important;
        }
        .cal-cell.today-date span {
            color: #b38600 !important;
        }
        .cal-cell.selected-date {
            border: 2px solid var(--save-color);
            background-color: #f0f7ff;
        }
        .memo-bar {
            width: 60%;
            height: 2px;
            background-color: #ff6b6b;
            border-radius: 2px;
            margin-top: 2px;
        }

        /* 입력 폼 영역 */
        .input-section {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }
        
        .input-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .section-label {
            font-size: 14px;
            font-weight: bold;
            color: #8c7664;
        }
        .datetime-toggle-btn {
            background: white;
            border: 1px dashed var(--border-color);
            color: #8c7664;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .datetime-toggle-btn:hover {
            background-color: #f1e4d8;
        }

        /* 순차적 예약 입력 패널 스타일 */
        .reservation-flow-box {
            display: none;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .reservation-info-bar {
            font-size: 13px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mini-cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 8px;
        }
        .mini-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }
        .mini-cal-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf6f2;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            color: #4a3f35;
        }
        .mini-cal-cell:hover {
            background: #f1e4d8;
        }
        .mini-cal-cell.selected {
            background: var(--save-color);
            color: white;
        }
        .time-picker-area {
            display: none;
            margin-top: 10px;
            text-align: center;
            background: #fff9f5;
            padding: 10px;
            border-radius: 8px;
        }
        .time-picker-area input {
            padding: 6px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            margin-left: 5px;
        }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .action-row {
            display: flex;
            gap: 8px;
        }
        #record-btn {
            flex: 1;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(255, 142, 148, 0.4);
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
        }
        .photo-upload-box {
            flex: 1;
            display: flex;
        }
        .photo-file-input {
            display: none;
        }
        .photo-upload-label {
            flex: 1;
            background-color: #f1e4d8;
            color: #5c4d40;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .photo-upload-label:hover {
            background-color: #e5d4c3;
        }

        #text-output {
            width: 100%;
            min-height: 80px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.4;
            background-color: #fffdfb;
            color: #2b231c;
            outline: none;
        }
        #text-output:empty:before {
            content: attr(placeholder);
            color: #b5a595;
            pointer-events: none;
            display: block;
        }
        #text-output:focus {
            border-style: solid;
            border-color: var(--save-color);
        }

        .photo-preview-container {
            margin-bottom: 10px;
            text-align: center;
        }
        .photo-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        #save-btn {
            background-color: var(--save-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(77, 166, 255, 0.3);
            width: 100%;
        }
        #save-btn:hover {
            background-color: var(--save-hover);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .filter-btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: white;
            color: #8c7664;
            cursor: pointer;
            text-align: center;
        }
        .filter-btn.active {
            background-color: #8c7664;
            color: white;
            border-color: #8c7664;
        }
        
        /* 메모 아이템 스타일 */
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            position: relative;
        }
        .diary-item.alarm-memo {
            background: #fff8f8;
            border: 1.5px solid #ffb3b3;
        }

        .diary-date {
            font-size: var(--date-font-size);
            color: #a09184;
            margin-bottom: 4px;
            font-weight: bold;
            display: inline-block;
            outline: none;
        }
        .diary-item.alarm-memo .diary-date {
            color: #e65c5c;
        }

        .diary-text {
            font-size: var(--text-font-size);
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            outline: none;
            color: #2b231c;
            font-weight: 500;
        }
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .diary-photo {
            max-width: 100%;
            max-height: 250px;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>📖 스마트 다이어리</h1>
        <button class="setting-btn" onclick="toggleSettingMenu()">⚙️ 설정</button>
    </div>
    
    <div class="setting-menu-box" id="setting-menu-box">
        <span class="setting-section-title">💊 약 챙기기 체크 설정</span>
        <div class="setting-row">
            <button class="setting-action-btn" onclick="togglePillDisplay('on')">켜기</button>
            <button class="setting-action-btn" onclick="togglePillDisplay('off')">끄기</button>
        </div>
        
        <span class="setting-section-title" style="margin-top: 12px;">🔍 메모 글자 크기 조절</span>
        <div class="setting-row">
            <button class="setting-action-btn" id="font-btn-normal" onclick="changeFontSize('normal')">보통</button>
            <button class="setting-action-btn" id="font-btn-large" onclick="changeFontSize('large')">크게</button>
            <button class="setting-action-btn" id="font-btn-xlarge" onclick="changeFontSize('xlarge')">아주 크게</button>
        </div>

        <span class="setting-section-title" style="margin-top: 12px;">💾 데이터 안전 백업 / 복원</span>
        <div class="setting-row">
            <button class="setting-action-btn" onclick="backupData()" style="background-color:#e6f7e6; color:#2eb82e; border-color:#2eb82e;">💾 백업하기</button>
            <button class="setting-action-btn" onclick="triggerRestore()" style="background-color:#e6f0ff; color:#358be6; border-color:#358be6;">📂 복원하기</button>
            <input type="file" id="restore-file-input" style="display:none;" accept=".json" onchange="restoreData(event)">
        </div>
    </div>

    <div class="pill-container" id="pill-box-container">
        <div class="pill-title">💊 오늘 약 챙겨 드셨나요? (터치하여 체크)</div>
        <div class="pill-buttons">
            <button class="pill-btn" id="pill-morning" onclick="togglePill('morning')">☀️ 아침</button>
            <button class="pill-btn" id="pill-lunch" onclick="togglePill('lunch')">🌤️ 점심</button>
            <button class="pill-btn" id="pill-dinner" onclick="togglePill('dinner')">🌙 저녁</button>
        </div>
    </div>
    
    <!-- 메인 캘린더 영역 (그대로 유지) -->
    <div class="calendar-box" id="calendar-box">
        <div class="cal-header">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">◀ 이전</button>
            <span id="cal-month-title"></span>
            <button class="cal-nav-btn" onclick="changeMonth(1)">다음 ▶</button>
        </div>
        <div class="cal-grid">
            <div class="cal-day-name" style="color:#e63946;">일</div>
            <div class="cal-day-name">월</div>
            <div class="cal-day-name">화</div>
            <div class="cal-day-name">수</div>
            <div class="cal-day-name">목</div>
            <div class="cal-day-name">금</div>
            <div class="cal-day-name" style="color:#337ab7;">토</div>
        </div>
        <div class="cal-grid" id="cal-days-grid" style="margin-top: 4px;"></div>
    </div>

    <!-- 입력 폼 영역 -->
    <div class="input-section">
        <div class="input-top-row">
            <span class="section-label">✏️ 새 메모 작성</span>
            <button class="datetime-toggle-btn" id="datetime-toggle-btn" onclick="toggleReservationFlow()">📅 예약일/알람 설정</button>
        </div>

        <!-- 순차적 예약 입력 패널 -->
        <div class="reservation-flow-box" id="reservation-flow-box">
            <div class="reservation-info-bar">
                <span id="reservation-guide-text">📅 예약할 날짜를 선택해주세요</span>
                <button onclick="cancelReservation()" style="background:none; border:none; color:#e65c5c; cursor:pointer; font-weight:bold; font-size:12px;">❌ 취소</button>
            </div>
            
            <!-- 미니 달력 -->
            <div id="mini-cal-container">
                <div class="mini-cal-header">
                    <button class="cal-nav-btn" onclick="changeMiniMonth(-1)">◀</button>
                    <span id="mini-cal-title"></span>
                    <button class="cal-nav-btn" onclick="changeMiniMonth(1)">▶</button>
                </div>
                <div class="mini-cal-grid" style="margin-bottom:4px;">
                    <div style="color:#e63946; font-size:11px; font-weight:bold;">일</div>
                    <div style="font-size:11px; font-weight:bold; color:#a09184;">월</div>
                    <div style="font-size:11px; font-weight:bold; color:#a09184;">화</div>
                    <div style="font-size:11px; font-weight:bold; color:#a09184;">수</div>
                    <div style="font-size:11px; font-weight:bold; color:#a09184;">목</div>
                    <div style="font-size:11px; font-weight:bold; color:#a09184;">금</div>
                    <div style="color:#337ab7; font-size:11px; font-weight:bold;">토</div>
                </div>
                <div class="mini-cal-grid" id="mini-cal-days-grid"></div>
            </div>

            <!-- 시간 선택 영역 (날짜 선택 후 등장) -->
            <div class="time-picker-area" id="time-picker-area">
                <span style="font-size:13px; font-weight:bold; color:#8c7664;">⏰ 시간 선택:</span>
                <input type="time" id="reservation-time-input" value="08:00">
                <button onclick="confirmTimeAndFocus()" style="background:var(--save-color); color:white; border:none; padding:6px 12px; border-radius:6px; font-weight:bold; font-size:13px; cursor:pointer; margin-left:8px;">확인</button>
            </div>
        </div>

        <div class="btn-box">
            <div class="action-row">
                <button id="record-btn">🎤 음성메모</button>
                <div class="photo-upload-box">
                    <label for="diary-photo-input" class="photo-upload-label">📷 사진메모</label>
                    <input type="file" id="diary-photo-input" class="photo-file-input" accept="image/*" onchange="previewImage(event)">
                </div>
            </div>

            <div id="photo-preview-wrap" style="display:none;" class="photo-preview-container">
                <img id="image-preview" class="photo-preview" src="" alt="미리보기">
                <button onclick="removeImage()" style="background:none; border:none; color:red; cursor:pointer; font-size:12px; display:block; margin:4px auto; font-weight:bold;">❌ 첨부 사진 취소</button>
            </div>
        </div>

        <div id="text-output" contenteditable="true" placeholder="이곳을 터치하여 메모를 남기세요..."></div>
        
        <button id="save-btn" onclick="manualSaveDiary()">💾 메모 저장</button>
    </div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 15px;">
    
    <!-- 필터 버튼 영역 -->
    <div class="filter-container">
        <button class="filter-btn" id="filter-all" onclick="changeFilter('all')">전체보기</button>
        <button class="filter-btn" id="filter-month" onclick="changeFilter('month')">최근 30일</button>
        <button class="filter-btn" id="filter-alarm" onclick="changeFilter('alarm')">예약보기</button>
    </div>

    <div class="diary-list" id="diary-list"></div>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const saveBtn = document.getElementById('save-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');
    const datetimeToggleBtn = document.getElementById('datetime-toggle-btn');
    const reservationFlowBox = document.getElementById('reservation-flow-box');
    const reservationGuideText = document.getElementById('reservation-guide-text');
    const miniCalContainer = document.getElementById('mini-cal-container');
    const timePickerArea = document.getElementById('time-picker-area');
    const reservationTimeInput = document.getElementById('reservation-time-input');

    let recognition;
    let isRecording = false;
    let shouldRestart = true; 
    let accumulatedText = '';
    
    let currentFilter = '3days';
    let selectedDateFilter = null; 
    let currentPhotoBase64 = null;
    
    let isCustomDateTime = false;
    let selectedReservationDate = null;
    let miniCalYear = new Date().getFullYear();
    let miniCalMonth = new Date().getMonth();

    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    let touchStartX = 0;
    let touchEndX = 0;

    const calendarBox = document.getElementById('calendar-box');
    calendarBox.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    calendarBox.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    });

    function handleSwipe() {
        if (touchEndX < touchStartX - 50) changeMonth(1);

    function restoreData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const content = e.target.result;
                const parsed = JSON.parse(content);
                
                if (Array.isArray(parsed)) {
                    if (confirm(`총 ${parsed.length개의 기록이 확인되었습니다. 기존 데이터에 덮어씌우거나 복원하시겠습니까?`)) {
                        localStorage.setItem('myDiaries', JSON.stringify(parsed));
                        renderCalendar();
                        displayDiaries();
                        alert('✨ 성공적으로 복원되었습니다!');
                    }
                } else {
                    alert('올바른 백업 파일 형식이 아닙니다.');
                }
            } catch (err) {
                alert('파일을 읽는 중 오류가 발생했습니다.');
            }
            event.target.value = '';
            closeSettingMenu();
        };
        reader.readAsText(file);
    }

    function normalizeDateStr(dateStr) {
        if (!dateStr) return getTodayStr();
        if (typeof dateStr !== 'string') dateStr = String(dateStr);
        if (dateStr.includes('T')) dateStr = dateStr.split('T')[0];
        
        let parts = dateStr.split(/[-./]/);
        if (parts.length === 3) {
            let y = parts[0].padStart(4, '0');
            let m = parts[1].padStart(2, '0');
            let d = parts[2].padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        return dateStr.trim();
    }

    function parseDateObj(dateStr) {
        const normalized = normalizeDateStr(dateStr);
        const [y, m, d] = normalized.split('-').map(Number);
        return new Date(y, m - 1, d);
    }

    function getDayOfWeekStr(dateStr) {
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const dObj = parseDateObj(dateStr);
        return days[dObj.getDay()];
    }

    function getFixedHolidays(year) {
        return [
            `${year}-01-01`, `${year}-03-01`, `${year}-05-05`, `${year}-06-06`,
            `${year}-08-15`, `${year}-10-03`, `${year}-10-09`, `${year}-12-25`
        ];
    }

    function getKoreanHolidays(year) {
        let holidays = new Set(getFixedHolidays(year));
        if (year === 2026) {
            holidays.add('2026-02-16'); holidays.add('2026-02-17'); holidays.add('2026-02-18');
            holidays.add('2026-05-24'); holidays.add('2026-05-25');
            holidays.add('2026-09-24'); holidays.add('2026-09-25'); holidays.add('2026-09-26');
        }
        return holidays;
    }

    function getTodayStr() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 600; 

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('image-preview').src = currentPhotoBase64;
                    document.getElementById('photo-preview-wrap').style.display = 'block';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false; 
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 완료';
            recordBtn.classList.add('recording');
            if(!accumulatedText) {
                textOutput.innerText = '귀 기울여 듣고 있습니다...';
            }
        };

        recognition.onerror = () => {
            if (isRecording) stopRecording(); 
        };

        recognition.onend = () => {
            if (shouldRestart && isRecording) {
                recognition.start();
            } else {
                stopRecording();
                const resultText = accumulatedText.trim();
                if (resultText.length > 0) {
                    textOutput.innerText = resultText;
                }
            }
        };

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const speechText = event.results[i][0].transcript.trim();
                    if (speechText.length > 0 && !accumulatedText.includes(speechText)) {
                        accumulatedText += speechText + ' ';
                        textOutput.innerText = accumulatedText.trim();
                    }
                }
            }
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.innerText = '이 브라우저는 음성 인식을 지원하지 않습니다.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 음성메모';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            shouldRestart = false; 
            recognition.stop();
        } else {
            shouldRestart = true;
            accumulatedText = '';
            recognition.start();
        }
    });

    function manualSaveDiary() {
        const text = textOutput.innerText.trim();
        const isDefaultText = text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다');
        const cleanText = isDefaultText ? '' : text;

        if (!cleanText && !currentPhotoBase64) {
            alert('저장할 내용이나 사진을 입력해주세요!');
            return;
        }

        let dateVal, timeVal;
        const now = new Date();
        const curY = now.getFullYear();
        const curM = String(now.getMonth() + 1).padStart(2, '0');
        const curD = String(now.getDate()).padStart(2, '0');
        const curHours = String(now.getHours()).padStart(2, '0');
        const curMinutes = String(now.getMinutes()).padStart(2, '0');

        let isAlarmOn = false; 

        if (isCustomDateTime && selectedReservationDate) {
            dateVal = selectedReservationDate;
            timeVal = reservationTimeInput.value || `08:00`;
            isAlarmOn = true; 
        } else {
            dateVal = `${curY}-${curM}-${curD}`;
            timeVal = `${curHours}:${curMinutes}`;
            isAlarmOn = false; 
        }

        const timestamp = Date.now();
        
        const newDiary = {
            id: timestamp,
            date: dateVal,
            time: timeVal,
            text: cleanText,
            photo: currentPhotoBase64,
            isAlarm: isAlarmOn,
            alarmChecked: false,
            dayBeforeNotified: false
        };

        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries.push(newDiary);
        
        diaries.sort((a, b) => {
            const timeA = new Date(`${normalizeDateStr(a.date)}T${a.time || '00:00'}`).getTime();
            const timeB = new Date(`${normalizeDateStr(b.date)}T${b.time || '00:00'}`).getTime();
            return timeB - timeA;
        });

        localStorage.setItem('myDiaries', JSON.stringify(diaries));

        textOutput.innerText = '';
        accumulatedText = '';
        removeImage();
        cancelReservation();
        
        renderCalendar();
        displayDiaries();
        alert('✨ 다이어리가 저장되었습니다!');
    }

    setInterval(() => {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        const now = new Date();
        const todayStr = getTodayStr();
        const currentHours = String(now.getHours()).padStart(2, '0');
        const currentMinutes = String(now.getMinutes()).padStart(2, '0');
        const currentTimeStr = `${currentHours}:${currentMinutes}`;

        let updated = false;
        diaries.forEach(d => {
            const dDateStr = normalizeDateStr(d.date);
            
            if (d.isAlarm && !d.dayBeforeNotified) {
                const targetObj = parseDateObj(dDateStr);
                const todayObj = parseDateObj(todayStr);
                const diffDays = Math.round((targetObj - todayObj) / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    d.dayBeforeNotified = true;
                    updated = true;
                    alert(`⏰ [예약 1일 전 알림]\n\n내일 (${dDateStr}) 예정된 메모가 있습니다!\n${d.text ? d.text.substring(0, 30) + '...' : '사진 메모'}`);
                }
            }

            if (d.isAlarm && dDateStr === todayStr && d.time === currentTimeStr && !d.alarmChecked) {
                d.alarmChecked = true;
                updated = true;
                alert(`⏰ [예약 당일 알람]\n\n${d.text ? d.text.substring(0, 30) + '...' : '사진 메모'}`);
            }
        });

        if (updated) {
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
        }
    }, 10000);

    function renderCalendar() {
        const grid = document.getElementById('cal-days-grid');
        const title = document.getElementById('cal-month-title');
        grid.innerHTML = '';
        title.innerText = `${calYear}년 ${calMonth + 1}월`;

        const firstDayIndex = new Date(calYear, calMonth, 1).getDay();
        const totalDays = new Date(calYear, calMonth + 1, 0).getDate();
        const holidays = getKoreanHolidays(calYear);
        const todayStr = getTodayStr();

        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        let memoDates = new Set();
        
        diaries.forEach(d => {
            if(d.date) memoDates.add(normalizeDateStr(d.date));
        });

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'cal-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'cal-cell';
            
            const rawDateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`; 
            const normalizedDateStr = normalizeDateStr(rawDateStr);
            const dObj = new Date(calYear, calMonth, day);
            const dayOfWeek = dObj.getDay();

            if (dayOfWeek === 0) cell.classList.add('sunday');
            else if (dayOfWeek === 6) cell.classList.add('saturday');

            if (holidays.has(normalizedDateStr)) cell.classList.add('holiday');
            
            if (normalizedDateStr === todayStr) {
                cell.classList.add('today-date');
            }

            if (selectedDateFilter === normalizedDateStr) cell.classList.add('selected-date');

            let hasMemo = memoDates.has(normalizedDateStr);

            cell.innerHTML = `<span>${day}</span>${hasMemo ? '<div class="memo-bar"></div>' : ''}`;
            
            cell.onclick = () => {
                if (selectedDateFilter === normalizedDateStr) {
                    selectedDateFilter = null;
                } else {
                    selectedDateFilter = normalizedDateStr;
                }
                renderCalendar();
                displayDiaries();
            };

            grid.appendChild(cell);
        }
    }

    function changeMonth(direction) {
        calMonth += direction;
        if (calMonth > 11) {
            calMonth = 0;
            calYear++;
        } else if (calMonth < 0) {
            calMonth = 11;
            calYear--;
        }
        renderCalendar();
    }

    function changeFilter(type) {
        currentFilter = type;
        selectedDateFilter = null;
        renderCalendar();
        displayDiaries();
    }

    function updateFilterButtonsUI() {
        const btnAll = document.getElementById('filter-all');
        const btnMonth = document.getElementById('filter-month');
        const btnAlarm = document.getElementById('filter-alarm');
        
        btnAll.classList.remove('active');
        btnMonth.classList.remove('active');
        btnAlarm.classList.remove('active');

        if (currentFilter === 'all') {
            btnAll.classList.add('active');
        } else if (currentFilter === 'month') {
            btnMonth.classList.add('active');
        } else if (currentFilter === 'alarm') {
            btnAlarm.classList.add('active');
        }
    }

    function displayDiaries() {
        updateFilterButtonsUI();
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaryList.innerHTML = '';

        const todayStr = getTodayStr();
        const todayObj = parseDateObj(todayStr);

        let filtered = diaries.filter(d => {
            const dDateStr = normalizeDateStr(d.date);
            const dDateObj = parseDateObj(dDateStr);

            if (selectedDateFilter) {
                return dDateStr === selectedDateFilter;
            }

            if (currentFilter === 'alarm') {
                const diffTime = dDateObj - todayObj;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                return d.isAlarm && diffDays >= 0;
            } else if (currentFilter === 'month') {
                const diffTime = todayObj - dDateObj;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                return diffDays >= 0 && diffDays <= 30;
            } else if (currentFilter === 'all') {
                return true;
            } else {
                const diffTime = todayObj - dDateObj;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                return diffDays >= 0 && diffDays <= 2;
            }
        });

        if (currentFilter === 'alarm') {
            filtered.sort((a, b) => {
                const dateA = parseDateObj(a.date);
                const dateB = parseDateObj(b.date);
                const diffA = Math.round((dateA - todayObj) / (1000 * 60 * 60 * 24));
                const diffB = Math.round((dateB - todayObj) / (1000 * 60 * 60 * 24));

                if (diffA === 1 && diffB !== 1) return -1;
                if (diffB === 1 && diffA !== 1) return 1;

                return dateA - dateB;
            });
        }

        if (filtered.length === 0) {
            diaryList.innerHTML = `<div style="text-align:center; color:#b5a595; padding:20px; font-size:14px;">저장된 다이어리가 없습니다.</div>`;
            return;
        }

        filtered.forEach(d => {
            const item = document.createElement('div');
            item.className = 'diary-item';
            
            if (d.isAlarm) {
                item.classList.add('alarm-memo');
            }

            const dateDiv = document.createElement('div');
            dateDiv.className = 'diary-date';
            dateDiv.contentEditable = 'true';
            
            const prefix = d.isAlarm ? '⏰ [예약] ' : '';
            const dateStrFormatted = normalizeDateStr(d.date);
            const dayOfWeek = getDayOfWeekStr(dateStrFormatted);
            
            dateDiv.innerText = `${prefix}${dateStrFormatted} (${dayOfWeek}) ${d.time || ''}`;
            
            dateDiv.onblur = () => {
                updateDiaryField(d.id, 'date', dateDiv.innerText);
            };

            const textDiv = document.createElement('div');
            textDiv.className = 'diary-text';
            textDiv.contentEditable = 'true';
            textDiv.innerText = d.text || '';
            textDiv.onblur = () => {
                updateDiaryField(d.id, 'text', textDiv.innerText);
            };

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.innerText = '삭제';
            delBtn.onclick = () => deleteDiary(d.id);

            item.appendChild(dateDiv);
            item.appendChild(textDiv);
            item.appendChild(delBtn);

            if (d.photo) {
                const img = document.createElement('img');
                img.className = 'diary-photo';
                img.src = d.photo;
                item.appendChild(img);
            }

            diaryList.appendChild(item);
        });
    }

    function updateDiaryField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        let target = diaries.find(d => d.id === id);
        if (!target) return;

        if (field === 'date') {
            let cleanVal = value.replace('⏰ [예약]', '').trim();
            cleanVal = cleanVal.replace(/\([일월화수목금토]\)/g, '').trim();
            let parts = cleanVal.split(' ');
            target.date = normalizeDateStr(parts[0]);
            if (parts[1]) target.time = parts[1];
        } else if (field === 'text') {
            target.text = value;
        }

        diaries.sort((a, b) => {
            const timeA = new Date(`${normalizeDateStr(a.date)}T${a.time || '00:00'}`).getTime();
            const timeB = new Date(`${normalizeDateStr(b.date)}T${b.time || '00:00'}`).getTime();
            return timeB - timeA;
        });

        localStorage.setItem('myDiaries', JSON.stringify(diaries));
        renderCalendar();
    }

    function deleteDiary(id) {
        if (!confirm('정말 이 메모를 삭제하시겠습니까?')) return;
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.filter(d => d.id !== id);
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
        renderCalendar();
        displayDiaries();
    }

    window.onload = () => {
        initFontSize();
        initPillSetting();
        renderCalendar();
        displayDiaries();
    };
</script>

</body>
</html>
