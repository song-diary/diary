<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 메모장</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --card-bg: #ffffff;
            --text-color: #4a3f35;
            --primary-color: #ff8e94;
            --primary-hover: #ff7179;
            --save-color: #4da6ff;
            --save-hover: #358be6;
            --border-color: #eaddd3;
            --pill-success: #2eb82e;
            --exit-color: #a09184;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(234, 221, 211, 0.5);
            box-sizing: border-box;
            position: relative;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            margin: 0;
            color: #d17377;
        }
        .setting-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            color: #8c7664;
            background-color: #fff9f5;
            font-weight: bold;
        }
        .setting-btn:hover {
            background-color: #f1e4d8;
        }

        .pill-container {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none; 
        }
        .pill-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #8c7664;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .pill-buttons {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .pill-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
            transition: all 0.2s;
            color: #777;
        }
        .pill-btn.taken {
            background-color: #e6f7e6;
            border-color: var(--pill-success);
            color: var(--pill-success);
        }

        .setting-menu-box {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .setting-section-title {
            font-size: 15px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 8px;
            display: block;
        }
        .setting-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .setting-action-btn {
            flex: 1;
            background-color: white;
            border: 1px solid var(--border-color);
            color: #6b584a;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .setting-action-btn:hover {
            background-color: #f1e4d8;
        }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .action-row {
            display: flex;
            gap: 10px;
        }
        #record-btn {
            flex: 1;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 142, 148, 0.4);
            transition: all 0.2s ease;
        }
        #record-btn.recording {
            background-color: #b3a297;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 10px rgba(179, 162, 151, 0.4);
        }
        .photo-upload-box {
            flex: 1;
            display: flex;
        }
        .photo-file-input {
            display: none;
        }
        .photo-upload-label {
            flex: 1;
            background-color: #f1e4d8;
            color: #5c4d40;
            padding: 15px 10px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(241, 228, 216, 0.4);
        }
        .photo-upload-label:hover {
            background-color: #e5d4c3;
        }

        .reservation-date-box {
            background-color: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            color: #8c7664;
            font-size: 16px;
        }
        .reservation-date-box input[type="date"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-color);
            background-color: white;
            outline: none;
            cursor: pointer;
        }

        #save-btn {
            background-color: var(--save-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(77, 166, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            display: none;
        }
        #save-btn:hover {
            background-color: var(--save-hover);
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        #text-output {
            width: 100%;
            min-height: 120px;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 22px;
            line-height: 1.6;
            background-color: #fffdfb;
            color: #2b231c;
            outline: none;
            position: relative;
        }
        #text-output:empty:before {
            content: attr(placeholder);
            color: #b5a595;
            pointer-events: none;
            display: block;
        }
        #text-output:focus {
            border-style: solid;
            border-color: var(--save-color);
        }
        .photo-preview-container {
            margin-top: 10px;
            position: relative;
            text-align: center;
        }
        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .diary-photo {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 12px;
            display: block;
            border: 1px solid var(--border-color);
        }

        #exit-btn {
            background-color: var(--exit-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(160, 145, 132, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 20px;
        }
        #exit-btn:hover {
            background-color: #8c7664;
        }

        .calendar-box {
            background: #fff9f5;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            touch-action: pan-y;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #8c7664;
            margin-bottom: 12px;
        }
        .cal-nav-btn {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-weight: bold;
            color: #8c7664;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .cal-day-name {
            font-size: 13px;
            font-weight: bold;
            color: #a09184;
            padding-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cal-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            position: relative;
            border: 1px solid #f0e6df;
            color: #4a3f35;
            overflow: hidden;
            box-sizing: border-box;
            padding: 2px;
        }
        /* 시스템 글자 크기 영향을 받아도 달력 안에서 글자가 넘치지 않도록 고정 크기 단위(px) 적용 */
        .cal-cell span {
            font-size: 15px !important;
            line-height: 1.2;
        }
        .cal-day-name {
            font-size: 13px !important;
        }

        .cal-cell.sunday {
            background-color: #fffafa;
            color: #d9534f;
        }
        .cal-cell.saturday {
            background-color: #f7fbff;
            color: #337ab7;
        }
        .cal-cell.empty {
            background: transparent;
            border: none;
            cursor: default;
        }
        .cal-cell.has-memo {
            background-color: #fff0eb;
            font-weight: bold;
            border-color: #ffb3a7;
        }
        .cal-cell.selected {
            background-color: var(--primary-color) !important;
            color: white !important;
            border-color: var(--primary-hover) !important;
        }
        .cal-cell.selected span {
            color: white !important;
        }
        .memo-dot {
            width: 5px;
            height: 5px;
            background-color: #ff5252;
            border-radius: 50%;
            margin-top: 2px;
        }
        .cal-cell.selected .memo-dot {
            background-color: white;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .filter-btn {
            padding: 8px 16px;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: white;
            color: #8c7664;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background-color: #8c7664;
            color: white;
            border-color: #8c7664;
        }
        .diary-list {
            margin-top: 10px;
        }
        .diary-item {
            background: #fffdfb;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .diary-date {
            font-size: 16px;
            color: #a09184;
            margin-bottom: 5px;
            font-weight: bold;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
        }
        .diary-text {
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            color: #2b231c;
            font-weight: 500;
            margin-top: 5px;
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #cca9a9;
            cursor: pointer;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ff5252;
        }
        .tip-text {
            font-size: 14px;
            color: #a09184;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>📝 스마트 메모장</h1>
        <button class="setting-btn" onclick="toggleSettingMenu()">⚙️ 설정</button>
    </div>
    
    <div class="setting-menu-box" id="setting-menu-box">
        <span class="setting-section-title">💊 약 챙기기 체크 설정</span>
        <div class="setting-row">
            <button class="setting-action-btn" onclick="togglePillDisplay('on')">켜기</button>
            <button class="setting-action-btn" onclick="togglePillDisplay('off')">끄기</button>
        </div>
        
        <span class="setting-section-title" style="margin-top: 15px;">💾 데이터 안전 백업 및 복원</span>
        <div class="setting-row">
            <button class="setting-action-btn" onclick="backupData()">📤 데이터 백업하기(파일저장)</button>
            <button class="setting-action-btn" onclick="triggerRestore()">📥 데이터 가져오기(복원)</button>
            <input type="file" id="restore-file-input" style="display:none;" accept=".json" onchange="restoreData(event)">
        </div>
    </div>

    <div class="pill-container" id="pill-box-container">
        <div class="pill-title">💊 오늘 약 챙겨 드셨나요? (터치하여 체크)</div>
        <div class="pill-buttons">
            <button class="pill-btn" id="pill-morning" onclick="togglePill('morning')">☀️ 아침</button>
            <button class="pill-btn" id="pill-lunch" onclick="togglePill('lunch')">🌤️ 점심</button>
            <button class="pill-btn" id="pill-dinner" onclick="togglePill('dinner')">🌙 저녁</button>
        </div>
    </div>
    
    <div class="btn-box">
        <div class="action-row">
            <button id="record-btn">🎤 음성메모</button>
            
            <div class="photo-upload-box">
                <label for="diary-photo-input" class="photo-upload-label">📷 사진메모</label>
                <input type="file" id="diary-photo-input" class="photo-file-input" accept="image/*" onchange="previewImage(event)">
            </div>
        </div>

        <div id="photo-preview-wrap" style="display:none;" class="photo-preview-container">
            <img id="image-preview" class="photo-preview" src="" alt="미리보기">
            <button onclick="removeImage()" style="background:none; border:none; color:red; cursor:pointer; font-size:13px; display:block; margin:8px auto; font-weight:bold;">❌ 첨부 사진 취소</button>
        </div>

        <div class="reservation-date-box">
            <span>📅 메모 예약일:</span>
            <input type="date" id="reservation-date-input">
        </div>

        <button id="save-btn" onclick="manualSaveDiary()">💾 이 내용으로 메모 저장</button>
    </div>
    
    <div id="text-output" contenteditable="true" placeholder="이곳을 터치하여 직접 메모를 남겨보세요..."></div>
    
    <hr style="border: 0; height: 1px; background: var(--border-color); margin-bottom: 20px;">
    
    <div class="calendar-box" id="calendar-box">
        <div class="cal-header">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">◀ 이전</button>
            <span id="cal-month-title">2026년 7월</span>
            <button class="cal-nav-btn" onclick="changeMonth(1)">다음 ▶</button>
        </div>
        <div class="cal-grid">
            <div class="cal-day-name" style="color:#d9534f;">일</div>
            <div class="cal-day-name">월</div>
            <div class="cal-day-name">화</div>
            <div class="cal-day-name">수</div>
            <div class="cal-day-name">목</div>
            <div class="cal-day-name">금</div>
            <div class="cal-day-name" style="color:#337ab7;">토</div>
        </div>
        <div class="cal-grid" id="cal-days-grid" style="margin-top: 5px;"></div>
    </div>

    <button id="exit-btn" onclick="closeApp()">🔒 메모장 안전하게 잠그기</button>

    <div class="filter-container">
        <button class="filter-btn" id="filter-all" onclick="changeFilter('all')">전체보기</button>
        <button class="filter-btn" id="filter-week" onclick="changeFilter('week')">1주일보기</button>
        <button class="filter-btn" id="filter-month" onclick="changeFilter('month')">1달보기</button>
    </div>

    <p class="tip-text">💡 달력을 좌우로 손가락으로 밀거나(스와이프) 날짜를 눌러 확인해보세요!</p>
    <div class="diary-list" id="diary-list"></div>
</div>

<script>
    const recordBtn = document.getElementById('record-btn');
    const saveBtn = document.getElementById('save-btn');
    const textOutput = document.getElementById('text-output');
    const diaryList = document.getElementById('diary-list');
    const reservationDateInput = document.getElementById('reservation-date-input');

    let recognition;
    let isRecording = false;
    let shouldRestart = true; 
    let accumulatedText = '';
    
    let currentFilter = localStorage.getItem('lastFilterState') || 'all';
    
    let selectedDateStr = null; 
    let currentPhotoBase64 = null;

    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth();

    let touchStartX = 0;
    let touchEndX = 0;
    const calendarBox = document.getElementById('calendar-box');

    calendarBox.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    calendarBox.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        const swipeThreshold = 50; 
        if (touchEndX < touchStartX - swipeThreshold) {
            changeMonth(1);
        } else if (touchEndX > touchStartX + swipeThreshold) {
            changeMonth(-1);
        }
    }

    function initReservationDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        reservationDateInput.value = `${year}-${month}-${day}`;
    }

    function getTodayStr() {
        const now = new Date();
        return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
    }

    function initPillSetting() {
        let showPill = localStorage.getItem('showPillSetting');
        if (showPill === null) {
            showPill = 'true';
            localStorage.setItem('showPillSetting', 'true');
        }
        
        const container = document.getElementById('pill-box-container');
        if (showPill === 'true') {
            container.style.display = 'block';
            loadPillState();
        } else {
            container.style.display = 'none';
        }
    }

    function toggleSettingMenu() {
        const menuBox = document.getElementById('setting-menu-box');
        if (menuBox.style.display === 'block') {
            menuBox.style.display = 'none';
        } else {
            menuBox.style.display = 'block';
        }
    }

    function closeSettingMenu() {
        document.getElementById('setting-menu-box').style.display = 'none';
    }

    function togglePillDisplay(action) {
        if (action === 'off') {
            localStorage.setItem('showPillSetting', 'false');
            alert('약 챙기기 기능이 꺼졌습니다.');
        } else {
            localStorage.setItem('showPillSetting', 'true');
            alert('약 챙기기 기능이 켜졌습니다!');
        }
        initPillSetting();
        closeSettingMenu();
    }

    function backupData() {
        const diaries = localStorage.getItem('myDiaries') || '[]';
        const blob = new Blob([diaries], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const now = new Date();
        const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `smart_memo_backup_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert('📤 백업 파일이 다운로드되었습니다! 안전한 곳에 보관해 주세요.');
        closeSettingMenu();
    }

    function triggerRestore() {
        closeSettingMenu();
        if (confirm('기존 메모에 백업 파일의 내용을 덮어쓰거나 추가합니다. 백업해둔 파일(.json)을 선택해 주세요.')) {
            document.getElementById('restore-file-input').click();
        }
    }

    function restoreData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    localStorage.setItem('myDiaries', JSON.stringify(importedData));
                    renderCalendar();
                    displayDiaries();
                    alert('📥 데이터가 성공적으로 복원되었습니다!');
                } else {
                    alert('올바른 백업 파일 형식이 아닙니다.');
                }
            } catch (err) {
                alert('파일을 읽는 중 오류가 발생했습니다.');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function loadPillState() {
        const savedDate = localStorage.getItem('pillDate');
        const today = getTodayStr();
        if (savedDate !== today) {
            localStorage.setItem('pillDate', today);
            localStorage.setItem('pillState', JSON.stringify({ morning: false, lunch: false, dinner: false }));
        }
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        updatePillButton('morning', state.morning, '☀️ 아침');
        updatePillButton('lunch', state.lunch, '🌤️ 점심');
        updatePillButton('dinner', state.dinner, '🌙 저녁');
    }

    function updatePillButton(type, isTaken, label) {
        const btn = document.getElementById(`pill-${type}`);
        if (!btn) return;
        if (isTaken) {
            btn.classList.add('taken');
            btn.innerHTML = `✅ ${label.split(' ')[1]}`;
        } else {
            btn.classList.remove('taken');
            btn.innerHTML = label;
        }
    }

    function togglePill(type) {
        const state = JSON.parse(localStorage.getItem('pillState') || '{"morning":false,"lunch":false,"dinner":false}');
        state[type] = !state[type];
        localStorage.setItem('pillState', JSON.stringify(state));
        const labels = { morning: '☀️ 아침', lunch: '🌤️ 점심', dinner: '🌙 저녁' };
        updatePillButton(type, state[type], labels[type]);
    }

    textOutput.addEventListener('input', () => {
        const text = textOutput.innerText.trim();
        const isDefaultText = text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다');
        
        if ((text.length > 0 && !isDefaultText) || currentPhotoBase64) {
            saveBtn.style.display = 'block';
        } else {
            saveBtn.style.display = 'none';
        }
    });

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 600; 

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const previewImg = document.getElementById('image-preview');
                    previewImg.src = currentPhotoBase64;
                    document.getElementById('photo-preview-wrap').style.display = 'block';
                    saveBtn.style.display = 'block'; 
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    function removeImage() {
        currentPhotoBase64 = null;
        document.getElementById('diary-photo-input').value = '';
        document.getElementById('photo-preview-wrap').style.display = 'none';
        document.getElementById('image-preview').src = '';
        
        const text = textOutput.innerText.trim();
        if(!text || text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다')) {
            saveBtn.style.display = 'none';
        }
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false; 
        recognition.lang = 'ko-KR';

        recognition.onstart = () => {
            isRecording = true;
            recordBtn.textContent = '🛑 완료';
            recordBtn.classList.add('recording');
            if(!accumulatedText) {
                textOutput.innerText = '귀 기울여 듣고 있습니다... 편하게 말씀하세요.';
            }
            saveBtn.style.display = 'none';
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            if (isRecording) stopRecording(); 
        };

        recognition.onend = () => {
            if (shouldRestart && isRecording) {
                recognition.start();
            } else {
                stopRecording();
                const resultText = accumulatedText.trim();
                if (resultText.length > 0 || currentPhotoBase64) {
                    if (resultText.length > 0) textOutput.innerText = resultText;
                    saveBtn.style.display = 'block'; 
                } else {
                    textOutput.innerText = '인식된 목소리가 없습니다. 다시 시도해 주세요.';
                    saveBtn.style.display = 'none';
                }
            }
        };

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const speechText = event.results[i][0].transcript.trim();
                    if (speechText.length > 0 && !accumulatedText.includes(speechText)) {
                        accumulatedText += speechText + ' ';
                        textOutput.innerText = accumulatedText.trim();
                        saveBtn.style.display = 'block';
                    }
                }
            }
        };
    } else {
        recordBtn.style.display = 'none';
        textOutput.innerText = '이 브라우저는 음성 인식을 지원하지 않습니다.';
    }

    function stopRecording() {
        isRecording = false;
        recordBtn.textContent = '🎤 음성메모';
        recordBtn.classList.remove('recording');
    }

    recordBtn.addEventListener('click', () => {
        if (isRecording) {
            shouldRestart = false; 
            recognition.stop();
        } else {
            shouldRestart = true;
            accumulatedText = '';
            recognition.start();
        }
    });

    function manualSaveDiary() {
        const text = textOutput.innerText.trim();
        const isDefaultText = text.includes('인식된 목소리가 없습니다') || text.includes('귀 기울여 듣고 있습니다');
        const cleanText = isDefaultText ? '' : text;

        if (!cleanText && !currentPhotoBase64) {
            return;
        }

        try {
            const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            
            const selectedVal = reservationDateInput.value;
            let dateStr = "";
            let simpleDateStr = "";

            if (selectedVal) {
                const parts = selectedVal.split('-');
                const y = parts[0];
                const m = parseInt(parts[1], 10);
                const d = parseInt(parts[2], 10);
                dateStr = `${y}년 ${m}월 ${d}일 예약`;
                simpleDateStr = `${y}-${m}-${d}`;
            } else {
                const now = new Date();
                dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
                simpleDateStr = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
            }
            
            diaries.unshift({ 
                id: Date.now(), 
                date: dateStr, 
                simpleDate: simpleDateStr,
                content: cleanText,
                photo: currentPhotoBase64,
                timestamp: Date.now()
            });
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            
            textOutput.innerText = '';
            removeImage();
            saveBtn.style.display = 'none';
            initReservationDate();
            
            renderCalendar();
            displayDiaries();
        } catch(e) {
            alert('사진 용량이 너무 큽니다. 다른 사진을 선택해주세요.');
        }
    }

    function updateField(id, field, value) {
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        diaries = diaries.map(item => {
            if (item.id === id) return { ...item, [field]: value.trim() };
            return item;
        });
        localStorage.setItem('myDiaries', JSON.stringify(diaries));
    }

    function deleteDiary(id) {
        if (confirm('이 메모를 삭제하시겠습니까?')) {
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(item => item.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            renderCalendar();
            displayDiaries();
        }
    }

    function changeFilter(filterType) {
        selectedDateStr = null; 
        currentFilter = filterType;
        localStorage.setItem('lastFilterState', filterType);

        updateFilterUI();
        renderCalendar();
        displayDiaries();
    }

    function updateFilterUI() {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`filter-${currentFilter}`);
        if (activeBtn) {
            activeBtn.classList.add('active');
        }
    }

    function changeMonth(direction) {
        calMonth += direction;
        if (calMonth > 11) {
            calMonth = 0;
            calYear++;
        } else if (calMonth < 0) {
            calMonth = 11;
            calYear--;
        }
        renderCalendar();
    }

    function renderCalendar() {
        document.getElementById('cal-month-title').innerText = `${calYear}년 ${calMonth + 1}월`;
        const grid = document.getElementById('cal-days-grid');
        grid.innerHTML = '';

        const firstDayIndex = new Date(calYear, calMonth, 1).getDay();
        const totalDays = new Date(calYear, calMonth + 1, 0).getDate();

        const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        const memoDates = new Set();
        
        diaries.forEach(item => {
            if (item.simpleDate) {
                memoDates.add(item.simpleDate);
            } else if (item.date) {
                const match = item.date.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
                if (match) {
                    memoDates.add(`${match[1]}-${match[2]}-${match[3]}`);
                }
            }
        });

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'cal-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            const thisDateObj = new Date(calYear, calMonth, day);
            const dayOfWeek = thisDateObj.getDay();
            
            let cellClass = 'cal-cell';
            if (dayOfWeek === 0) {
                cellClass += ' sunday';
            } else if (dayOfWeek === 6) {
                cellClass += ' saturday';
            }
            cell.className = cellClass;

            const thisDateStr = `${calYear}-${calMonth + 1}-${day}`;
            
            let htmlContent = `<span>${day}</span>`;
            if (memoDates.has(thisDateStr)) {
                cell.classList.add('has-memo'); 
                htmlContent += `<div class="memo-dot"></div>`;
            }

            if (selectedDateStr === thisDateStr) {
                cell.classList.add('selected');
            }

            cell.innerHTML = htmlContent;
            
            cell.addEventListener('click', () => {
                if (selectedDateStr === thisDateStr) {
                    selectedDateStr = null; 
                } else {
                    selectedDateStr = thisDateStr;
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                }
                renderCalendar();
                displayDiaries();
            });

            grid.appendChild(cell);
        }
    }

    function displayDiaries() {
        diaryList.innerHTML = '';
        let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
        
        const nowTime = new Date().setHours(0,0,0,0);
        const oneWeek = 7 * 24 * 60 * 60 * 1000;
        const oneMonth = 30 * 24 * 60 * 60 * 1000;

        if (selectedDateStr) {
            diaries = diaries.filter(item => {
                if (item.simpleDate === selectedDateStr) return true;
                if (item.date) {
                    const match = item.date.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
                    if (match && `${match[1]}-${match[2]}-${match[3]}` === selectedDateStr) return true;
                }
                return false;
            });
        } else {
            diaries = diaries.filter(item => {
                let itemTime = nowTime;
                if (item.simpleDate) {
                    const p = item.simpleDate.split('-');
                    itemTime = new Date(p[0], p[1]-1, p[2]).setHours(0,0,0,0);
                }
                if (itemTime > nowTime && currentFilter !== 'all') {
                    return false;
                }
                return true;
            });

            if (currentFilter === 'week') {
                diaries = diaries.filter(item => {
                    let itemTime = nowTime;
                    if (item.simpleDate) {
                        const p = item.simpleDate.split('-');
                        itemTime = new Date(p[0], p[1]-1, p[2]).setHours(0,0,0,0);
                    }
                    return (nowTime - itemTime) <= oneWeek && itemTime <= nowTime;
                });
            } else if (currentFilter === 'month') {
                diaries = diaries.filter(item => {
                    let itemTime = nowTime;
                    if (item.simpleDate) {
                        const p = item.simpleDate.split('-');
                        itemTime = new Date(p[0], p[1]-1, p[2]).setHours(0,0,0,0);
                    }
                    return (nowTime - itemTime) <= oneMonth && itemTime <= nowTime;
                });
            }
        }
        
        if (diaries.length === 0) {
            diaryList.innerHTML = `<div style="text-align:center; color:#a09184; padding:20px; font-size:16px;">해당하는 메모가 없습니다.</div>`;
            return;
        }

        diaries.forEach(item => {
            const diaryItem = document.createElement('div');
            diaryItem.className = 'diary-item';
            
            const photoHtml = item.photo ? `<img src="${item.photo}" class="diary-photo" alt="메모 사진">` : '';

            diaryItem.innerHTML = `
                <div>
                    <div class="diary-date" contenteditable="true" data-id="${item.id}">${item.date}</div>
                </div>
                <div class="diary-text" contenteditable="true" data-id="${item.id}">${item.content}</div>
                ${photoHtml}
                <button class="delete-btn" onclick="deleteDiary(${item.id})">❌ 삭제</button>
            `;
            diaryList.appendChild(diaryItem);
        });

        document.querySelectorAll('.diary-date').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'date', this.innerText);
            });
        });

        document.querySelectorAll('.diary-text').forEach(element => {
            element.addEventListener('blur', function() {
                updateField(parseInt(this.getAttribute('data-id')), 'content', this.innerText);
            });
        });
    }

    function closeApp() {
        shouldRestart = false;
        if (recognition && isRecording) {
            recognition.stop();
        }
        accumulatedText = '';
        textOutput.innerText = '';
        removeImage();
        saveBtn.style.display = 'none';
        
        alert("🔒 마이크가 꺼졌으며 메모 창이 안전하게 정리되었습니다. 이제 스마트폰 홈 버튼을 누르고 나가하시면 됩니다!");
    }

    initReservationDate();
    initPillSetting();
    updateFilterUI();
    renderCalendar();
    displayDiaries();
</script>

</body>
</html>
