<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 손금 분석기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; }
        #canvas { width: 100%; height: 200px; background: #334155; border-radius: 10px; margin: 20px 0; border: 2px dashed #64748b; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #scan-bar { width: 100%; height: 5px; background: #a855f7; display: none; position: relative; animation: scan 2s linear infinite; }
        @keyframes scan { from { top: -100px; } to { top: 100px; } }
        button { width: 100%; padding: 15px; background: #a855f7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 10px; text-align: left; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 AI 정통 손금 분석</h1>
    <div id="canvas"><p id="status">손바닥 사진을 찍어주세요</p><div id="scan-bar"></div></div>
    <button id="snap-btn" onclick="takePhoto()">📸 손바닥 스캔 시작</button>
    <div id="result"></div>
</div>

<script>
    function takePhoto() {
        document.getElementById('status').innerText = "이미지 처리 중...";
        document.getElementById('snap-btn').disabled = true;
        document.getElementById('scan-bar').style.display = 'block';

        setTimeout(() => {
            document.getElementById('scan-bar').style.display = 'none';
            document.getElementById('status').innerText = "분석이 완료되었습니다.";
            showAnalysis();
        }, 3000);
    }

    function showAnalysis() {
        const results = [
            "✨ **조상운:** 신비 십자문이 선명합니다. 조상의 보호를 받는 강한 운세입니다.",
            "✨ **지능운:** 두뇌선이 깊어 현실적인 판단력이 뛰어난 리더형입니다.",
            "✨ **재물운:** 재물선이 안정적이라 정직한 노력의 결실이 큽니다.",
            "✨ **배우자운:** 결혼선이 곧게 뻗어 인연이 깊고 다정한 가정운입니다.",
            "✨ **자녀운:** 자녀선이 뚜렷하여 가족의 화목함이 큰 활력소입니다.",
            "✨ **부모운:** 목성구의 기운이 좋아 부모님의 덕을 많이 받을 상입니다."
        ];
        
        let html = "<h3>📋 AI 정밀 분석 결과</h3>";
        results.forEach(r => html += `<p>${r}</p>`);
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = html;
        resDiv.style.display = 'block';
    }
</script>
</body>
</html>
